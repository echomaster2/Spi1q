<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SPI Master | Ultrasound Physics & Registry Prep</title>
    <meta name="description" content="Master the ARDMS SPI exam with high-fidelity interactive physics simulations, AI tutoring, and registry-weighted study modules." />
    
    <!-- PWA & iOS -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SPI Master">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063823.png">
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EchoMaster - SPI Registry Master" />
    <meta property="og:description" content="High-fidelity interactive acoustic physics simulations for sonographers." />
    <meta property="og:image" content="https://picsum.photos/seed/ultrasound/1200/630" />
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 10px; display: none;"></div>
    <script>
      function logError(msg, extra) {
        fetch('/api/remote-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, extra: extra || {}, timestamp: new Date().toISOString() })
        }).catch(console.warn);
      }
      window.addEventListener('error', function(e) {
        var el = document.getElementById('error-log');
        el.style.display = 'block';
        var errorMsg = e.message + ' at ' + e.filename + ':' + e.lineno;
        el.innerText += errorMsg + '\n';
        logError('Client Error: ' + errorMsg, { stack: e.error && e.error.stack });
      });
      window.addEventListener('unhandledrejection', function(e) {
        var reasonMsg = (e.reason && e.reason.message) || String(e.reason);
        if (reasonMsg && (reasonMsg.includes('WebSocket') || reasonMsg.includes('socket'))) {
           return; // Suppress benign websocket errors from vite
        }
        var el = document.getElementById('error-log');
        el.style.display = 'block';
        var errorMsg = 'Unhandled rejection: ' + reasonMsg;
        el.innerText += errorMsg + '\n';
        logError('Unhandled Promise Rejection', { reason: String(e.reason) });
      });
    </script>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #0b0f1a; color: #00f5d4; font-family: sans-serif; flex-direction: column;">
        <div style="width: 50px; height: 50px; border: 3px solid rgba(0, 245, 212, 0.1); border-top-color: #00f5d4; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; font-size: 12px;">Initializing System Nodes...</p>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
